name: Publish Android Update JSON
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Версия без префикса v (например, 1.9)"
        required: false
        type: string
      asset_url:
        description: "Полный URL до APK файла"
        required: false
        type: string
  release:
    types: [published]

jobs:
  update-apk-json:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release info
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_INPUT="${{ github.event.inputs.version }}"
            ASSET_URL_INPUT="${{ github.event.inputs.asset_url }}"
            if [ -z "$VERSION_INPUT" ] || [ -z "$ASSET_URL_INPUT" ]; then
              echo "Для ручного запуска нужны version и asset_url" >&2
              exit 1
            fi
            # Извлекаем имя файла из URL для ручного запуска
            FILENAME=$(basename "$ASSET_URL_INPUT")
            echo "VERSION=$VERSION_INPUT" >> "$GITHUB_ENV"
            echo "ASSET_URL=$ASSET_URL_INPUT" >> "$GITHUB_ENV"
            echo "APK_NAME=$FILENAME" >> "$GITHUB_ENV"
          else
            TAG_NAME="${{ github.ref_name }}"
            CLEAN_VERSION="${TAG_NAME#v}"
            FILENAME="Nova_${CLEAN_VERSION}.apk"
            echo "VERSION=$CLEAN_VERSION" >> "$GITHUB_ENV"
            echo "APK_NAME=$FILENAME" >> "$GITHUB_ENV"
            echo "ASSET_URL=https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${FILENAME}" >> "$GITHUB_ENV"
          fi

      - name: Download APK asset (with retry)
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Попытка $attempt скачать ${{ env.APK_NAME }}..."
            # Используем оригинальное имя файла для сохранения (-O)
            if wget --timeout=30 -q "${{ env.ASSET_URL }}" -O "${{ env.APK_NAME }}" 2>/dev/null; then
              FILE_SIZE=$(stat -c%s "${{ env.APK_NAME }}" 2>/dev/null || echo 0)
              if [ "$FILE_SIZE" -gt 1000 ]; then
                echo "APK скачан успешно (${FILE_SIZE} байт)."
                exit 0
              else
                echo "Файл слишком маленький, asset ещё не готов."
                rm -f "${{ env.APK_NAME }}"
              fi
            else
              echo "wget вернул ошибку."
            fi
            [ "$attempt" -lt 5 ] && sleep 15
          done
          exit 1

      - name: Calculate SHA256
        run: |
          # Считаем хеш, используя переменную имени файла
          HASH=$(sha256sum "${{ env.APK_NAME }}" | awk '{print $1}')
          echo "SHA256=$HASH" >> "$GITHUB_ENV"

      - name: Checkout updates repo
        uses: actions/checkout@v5
        with:
          repository: confeden/nova_updates
          token: ${{ secrets.UPDATES_TOKEN }}
          path: updates_repo

      - name: Update apk_version.json
        run: |
          cd updates_repo
          cat > apk_version.json <<EOF
          {
            "version": "${{ env.VERSION }}",
            "url": "${{ env.ASSET_URL }}",
            "sha256": "${{ env.SHA256 }}"
          }
          EOF
          git config user.name "Nova Android Update Bot"
          git config user.email "bot@nova.app"
          git add apk_version.json
          if git diff --cached --quiet; then
            echo "Изменений нет"
          else
            git commit -m "Auto-update Android to version ${{ env.VERSION }}"
            git push
          fi
